job_name: "3d-voxel-packing-frontier-eval"
jobs_dir: "evaluation/results"
n_attempts: 3           # 3 independent runs per model (9 trials total)
n_concurrent_trials: 3  # run all 3 concurrently (API calls are I/O-bound)

tasks:
  - path: "./harbor-task"

environment:
  type: "docker"

agents:
  - name: "terminus-2"
    model_name: "openrouter/openai/gpt-5.4"
    kwargs:
      max_turns: 40
      temperature: 0.0

  - name: "terminus-2"
    model_name: "openrouter/anthropic/claude-opus-4.6"
    kwargs:
      max_turns: 40
      temperature: 0.0

  - name: "terminus-2"
    model_name: "openrouter/google/gemini-pro-1.5"
    kwargs:
      max_turns: 40
      temperature: 0.0
